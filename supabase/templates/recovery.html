<h2>Reset your password</h2>

<p>We received a request to reset the password for your LuminaClean account. Click the link below to choose a new one. If you didn't request this, you can safely ignore this email.</p>

<p>
  <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/auth/reset-password">Reset password</a>
</p>

<p>This link expires in one hour and can only be used once.</p>
