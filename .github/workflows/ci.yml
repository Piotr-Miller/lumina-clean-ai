name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      # Pure unit tests only (incl. the /callback hardening suite). The
      # jobs.rls.test.ts integration suite runs in the `integration` job below
      # (it needs Docker + a local Supabase); see tests/README.md.
      - run: npm run test:unit
      # Static-check the Deno Edge Function on every push AND PR. supabase/
      # functions/** is excluded from the Astro tsc/eslint graph (see
      # context/foundation/lessons.md), so `deno check` is its ONLY static
      # coverage â€” and running it here (not just in `deploy`) gates PRs too.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/enhance/index.ts
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  integration:
    # Full Vitest suite INCLUDING tests/jobs.rls.test.ts, which deliberately
    # does not mock Supabase â€” it hits an ephemeral local stack (Docker) to
    # lock RLS / storage / retention against a real runtime.
    #
    # This is a SEPARATE job on purpose: the local credentials it writes to
    # $GITHUB_ENV must never share a process with the `ci` job's prod-secret
    # `build` step, or the build would silently run against the local stack.
    # No GitHub secrets are used here â€” `supabase start` generates the local
    # keys â€” so this job also runs on fork PRs.
    runs-on: ubuntu-latest
    # Bound a pathological hang (a wedged container after the boot retry, or a
    # stuck `npm test`). This job gates `deploy` via `needs:`, so failing fast
    # beats leaving a deploy pending under GitHub's default 360-min timeout.
    # Observed wall-clock is ~2-4 min; 15 is generous headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the Supabase service images (all pulled from public.ecr.aws) across
      # runs. The root cause of intermittent `error running container: exit 1`
      # failures here was the anonymous-pull rate limit on that registry
      # (`toomanyrequests: Rate exceeded`) â€” GitHub-hosted runners share egress
      # IPs, so cold pulls of ~14 images get throttled. Restoring from cache means
      # `supabase start` / `db reset` find the images locally and skip the pull.
      # Key on the lockfile (pins the supabase CLI â†’ image tags) + config.toml.
      - name: Cache Supabase Docker images
        id: supabase-images
        uses: actions/cache@v5
        with:
          path: ~/supabase-images
          key: supabase-images-${{ runner.os }}-${{ hashFiles('package-lock.json', 'supabase/config.toml') }}
      - name: Load cached Supabase images
        if: steps.supabase-images.outputs.cache-hit == 'true'
        run: |
          shopt -s nullglob
          for tar in ~/supabase-images/*.tar; do
            docker load -i "$tar"
          done
      # `supabase start` boots Postgres + Auth + Storage in Docker (~1-2 min on a
      # cold image pull; near-instant on a cache hit). Retry once after a clean
      # stop so a transient Docker/image-pull hiccup doesn't false-fail the job â€”
      # and, since `deploy` needs this job, doesn't false-block a deploy.
      # `--no-backup` deletes the data volumes so the retry boots clean.
      - name: Start local Supabase (retry once on transient boot failure)
        run: |
          npx supabase start || {
            echo "::warning::supabase start failed; stopping and retrying once"
            npx supabase stop --no-backup || true
            npx supabase start
          }
      # On a cache miss, persist the freshly-pulled images so the next run's
      # restore step finds them. `actions/cache` saves ~/supabase-images in its
      # post-job step (only when the key was a miss). Grep on the public.ecr.aws
      # registry to capture every Supabase service image and nothing the runner
      # preloaded (those come from docker.io / ghcr / mcr).
      - name: Save Supabase images to cache
        if: steps.supabase-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/supabase-images
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E 'public\.ecr\.aws|supabase/' \
            | while read -r img; do
                fname=$(echo "$img" | tr '/:' '__')
                docker save "$img" -o ~/supabase-images/"$fname.tar"
              done
      # Apply every migration â†’ creates public.jobs + the private `photos`
      # storage bucket the suite needs. Mirrors the documented dev flow
      # (tests/README.md); no seed.sql exists, all test data is runtime-created.
      # Retry once on a transient container failure (same `toomanyrequests` /
      # flaky-boot class the `start` step guards against): `db reset` spins up a
      # fresh schema-init container, so it shares that exposure. `db reset`
      # recreates the database itself, so a bare retry is sufficient â€” no stop.
      - name: Apply migrations (retry once on transient container failure)
        run: |
          npx supabase db reset || {
            echo "::warning::supabase db reset failed; retrying once"
            npx supabase db reset
          }
      # Export the three vars tests/env.ts requires, renamed from the local
      # stack's status output (override-name keys are the documented config
      # paths â€” see `supabase status --help`). Safe to write to $GITHUB_ENV:
      # this job has no prod-secret step to bleed into.
      #
      # `-o env` wraps every value in double quotes (NAME="value"); $GITHUB_ENV
      # stores the line verbatim, so the quotes would become part of the value
      # and supabase-js rejects SUPABASE_URL as "not a valid HTTP/HTTPS URL".
      # Strip the surrounding quotes before appending (values are URLs/keys â€”
      # none contain an internal double-quote, so this is safe). Lines without
      # surrounding quotes pass through unchanged.
      - name: Export local Supabase credentials
        run: |
          npx supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - run: npm test

  deploy:
    needs: [ci, integration]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      # Unit tests run in `ci`; the full suite runs in `integration`; `deno
      # check` runs in `ci`. All three gate this job via `needs:` above, so
      # none are repeated here.
      # App â†’ Cloudflare Workers. Worker runtime secrets were set once via
      # `wrangler secret put` (Phase 2 #5) and persist across deploys, so
      # CLOUD_PIPELINE_ENABLED=false / CLOUD_DAILY_CAP=0 stay authoritative.
      # The build still needs SUPABASE_URL/SUPABASE_KEY as build-time env.
      # v4 runs on Node 24 (v3 was Node 20 â€” forced off by GitHub 2026-06-16) and
      # defaults to Wrangler v4, matching the project's wrangler 4.x devDependency.
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npm run build
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Edge Function â†’ Supabase. Use the version-pinned supabase CLI from
      # devDependencies via npx (deterministic â€” no unpinned global install).
      # --use-api forces API bundling (no Docker on the runner); the deploy
      # honors config.toml verify_jwt=false.
      - run: npx supabase functions deploy enhance --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
