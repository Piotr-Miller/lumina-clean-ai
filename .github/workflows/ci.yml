name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      # Pure unit tests only (incl. the /callback hardening suite). The
      # jobs.rls.test.ts integration suite needs Docker + a local Supabase and
      # is excluded — it stays developer-local (see tests/README.md).
      - run: npm run test:unit
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      # Unit tests run in the `ci` job (gates PRs + pushes); not repeated here.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/enhance/index.ts
      # App → Cloudflare Workers. Worker runtime secrets were set once via
      # `wrangler secret put` (Phase 2 #5) and persist across deploys, so
      # CLOUD_PIPELINE_ENABLED=false / CLOUD_DAILY_CAP=0 stay authoritative.
      # The build still needs SUPABASE_URL/SUPABASE_KEY as build-time env.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: npm run build
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Edge Function → Supabase. --use-api forces API bundling (no Docker on
      # the runner) deterministically; the deploy honors config.toml verify_jwt=false.
      - run: |
          npm i -g supabase
          supabase functions deploy enhance --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
