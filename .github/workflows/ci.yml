name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      # Pure unit tests only (incl. the /callback hardening suite). The
      # jobs.rls.test.ts integration suite runs in the `integration` job below
      # (it needs Docker + a local Supabase); see tests/README.md.
      - run: npm run test:unit
      # Static-check the Deno Edge Function on every push AND PR. supabase/
      # functions/** is excluded from the Astro tsc/eslint graph (see
      # context/foundation/lessons.md), so `deno check` is its ONLY static
      # coverage — and running it here (not just in `deploy`) gates PRs too.
      # --config is required: run from the repo root, deno would otherwise
      # discover no deno.json (none at root) and resolve bare specifiers from
      # the app's node_modules (installed by `npm ci`). That hides @sentry/deno,
      # which lives ONLY in the function's import map — yielding a spurious
      # "not a dependency" error. Pointing at the function's deno.json loads its
      # import map so the npm:@sentry/deno specifier resolves.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check --config supabase/functions/enhance/deno.json supabase/functions/enhance/index.ts
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  integration:
    # Full Vitest suite INCLUDING tests/jobs.rls.test.ts, which deliberately
    # does not mock Supabase — it hits an ephemeral local stack (Docker) to
    # lock RLS / storage / retention against a real runtime.
    #
    # This is a SEPARATE job on purpose: the local credentials it writes to
    # $GITHUB_ENV must never share a process with the `ci` job's prod-secret
    # `build` step, or the build would silently run against the local stack.
    # No GitHub secrets are used here — `supabase start` generates the local
    # keys — so this job also runs on fork PRs.
    runs-on: ubuntu-latest
    # Bound a pathological hang (a wedged container after the boot retry, or a
    # stuck `npm test`). This job gates `deploy` via `needs:`, so failing fast
    # beats leaving a deploy pending under GitHub's default 360-min timeout.
    # Observed wall-clock is ~2-4 min; 15 is generous headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Cache the Supabase service images (all pulled from public.ecr.aws) across
      # runs. The root cause of intermittent `error running container: exit 1`
      # failures here was the anonymous-pull rate limit on that registry
      # (`toomanyrequests: Rate exceeded`) — GitHub-hosted runners share egress
      # IPs, so cold pulls of ~14 images get throttled. Restoring from cache means
      # `supabase start` / `db reset` find the images locally and skip the pull.
      # Key on the lockfile (pins the supabase CLI → image tags) + config.toml.
      - name: Cache Supabase Docker images
        id: supabase-images
        uses: actions/cache@v5
        with:
          path: ~/supabase-images
          key: supabase-images-${{ runner.os }}-${{ hashFiles('package-lock.json', 'supabase/config.toml') }}
      - name: Load cached Supabase images
        if: steps.supabase-images.outputs.cache-hit == 'true'
        run: |
          shopt -s nullglob
          for tar in ~/supabase-images/*.tar; do
            docker load -i "$tar"
          done
      # `supabase start` boots Postgres + Auth + Storage in Docker (~1-2 min on a
      # cold image pull; near-instant on a cache hit). Retry once after a clean
      # stop so a transient Docker/image-pull hiccup doesn't false-fail the job —
      # and, since `deploy` needs this job, doesn't false-block a deploy.
      # `--no-backup` deletes the data volumes so the retry boots clean.
      - name: Start local Supabase (retry once on transient boot failure)
        run: |
          npx supabase start || {
            echo "::warning::supabase start failed; stopping and retrying once"
            npx supabase stop --no-backup || true
            npx supabase start
          }
      # On a cache miss, persist the freshly-pulled images so the next run's
      # restore step finds them. `actions/cache` saves ~/supabase-images in its
      # post-job step (only when the key was a miss). Grep on the public.ecr.aws
      # registry to capture every Supabase service image and nothing the runner
      # preloaded (those come from docker.io / ghcr / mcr).
      - name: Save Supabase images to cache
        if: steps.supabase-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/supabase-images
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E 'public\.ecr\.aws|supabase/' \
            | while read -r img; do
                fname=$(echo "$img" | tr '/:' '__')
                docker save "$img" -o ~/supabase-images/"$fname.tar"
              done
      # Apply every migration → creates public.jobs + the private `photos`
      # storage bucket the suite needs. Mirrors the documented dev flow
      # (tests/README.md); no seed.sql exists, all test data is runtime-created.
      # Retry once on a transient container failure (same `toomanyrequests` /
      # flaky-boot class the `start` step guards against): `db reset` spins up a
      # fresh schema-init container, so it shares that exposure. `db reset`
      # recreates the database itself, so a bare retry is sufficient — no stop.
      - name: Apply migrations (retry once on transient container failure)
        run: |
          npx supabase db reset || {
            echo "::warning::supabase db reset failed; retrying once"
            npx supabase db reset
          }
      # Export the three vars tests/env.ts requires, renamed from the local
      # stack's status output (override-name keys are the documented config
      # paths — see `supabase status --help`). Safe to write to $GITHUB_ENV:
      # this job has no prod-secret step to bleed into.
      #
      # `-o env` wraps every value in double quotes (NAME="value"); $GITHUB_ENV
      # stores the line verbatim, so the quotes would become part of the value
      # and supabase-js rejects SUPABASE_URL as "not a valid HTTP/HTTPS URL".
      # Strip the surrounding quotes before appending (values are URLs/keys —
      # none contain an internal double-quote, so this is safe). Lines without
      # surrounding quotes pass through unchanged.
      - name: Export local Supabase credentials
        run: |
          npx supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - run: npm test

  e2e:
    # Playwright browser-level gate on the north-star flow (risks #1+#6) and the
    # stall→terminal spec (risk #1 stall half). Like `integration`, it boots an
    # ephemeral local Supabase (Docker) and uses NO GitHub secrets — `supabase
    # start` generates the local keys — so it also runs on fork PRs. The Cloud-AI
    # pipeline is STUBBED end-to-end: the north-star spec POSTs a self-signed
    # Replicate `/callback` (no Replicate account, no token, no cold boot); the
    # stall spec relies on the DB webhook staying UNWIRED (the CI default), so a
    # submitted row sits `queued` until the client watchdog surfaces the timeout.
    # The live cold-boot path stays a manual smoke
    # (context/foundation/cloud-live-smoke.md), never a PR gate.
    runs-on: ubuntu-latest
    # Cold ~5-7 min (stack boot + browser install + the ~30s stall spec); warm
    # ~4-5 with both caches. 20 fails a wedged container/serve fast — this job
    # gates `deploy` via `needs:`, so a hang must not sit at GitHub's 360-min
    # default.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # ——— Ephemeral local Supabase: same image-cache + retry hardening as the
      # `integration` job above (see that job's comments and lessons.md "Cache
      # Supabase CI images …" — anonymous public.ecr.aws pulls are rate-limited
      # on shared runners). Same cache key ⇒ this job and `integration` share the
      # restored image set.
      - name: Cache Supabase Docker images
        id: supabase-images
        uses: actions/cache@v5
        with:
          path: ~/supabase-images
          key: supabase-images-${{ runner.os }}-${{ hashFiles('package-lock.json', 'supabase/config.toml') }}
      - name: Load cached Supabase images
        if: steps.supabase-images.outputs.cache-hit == 'true'
        run: |
          shopt -s nullglob
          for tar in ~/supabase-images/*.tar; do
            docker load -i "$tar"
          done
      - name: Start local Supabase (retry once on transient boot failure)
        run: |
          npx supabase start || {
            echo "::warning::supabase start failed; stopping and retrying once"
            npx supabase stop --no-backup || true
            npx supabase start
          }
      - name: Save Supabase images to cache
        if: steps.supabase-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/supabase-images
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -E 'public\.ecr\.aws|supabase/' \
            | while read -r img; do
                fname=$(echo "$img" | tr '/:' '__')
                docker save "$img" -o ~/supabase-images/"$fname.tar"
              done
      - name: Apply migrations (retry once on transient container failure)
        run: |
          npx supabase db reset || {
            echo "::warning::supabase db reset failed; retrying once"
            npx supabase db reset
          }
      # Export the three local creds to BOTH targets:
      #   - $GITHUB_ENV  → the Playwright TEST process (tests/e2e/helpers/env.ts
      #     loopback guard + resolveSigningSecret read process.env);
      #   - .dev.vars    → the DEV SERVER. `npm run dev` (astro dev) runs SSR in
      #     workerd via @astrojs/cloudflare, which reads .dev.vars, NOT
      #     process.env (CLAUDE.md "Cloudflare local dev"). .dev.vars is
      #     gitignored — generating it here is clean.
      # `-o env` wraps values in double quotes; $GITHUB_ENV stores the line
      # verbatim, so strip the surrounding quotes (URLs/keys carry no internal
      # quote). Same sed as `integration`.
      - name: Export local Supabase credentials (process env + .dev.vars)
        run: |
          npx supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' > .supabase.env
          cat .supabase.env >> "$GITHUB_ENV"
          { cat .supabase.env; echo "CLOUD_PIPELINE_ENABLED=false"; } > .dev.vars
          rm .supabase.env
      # The Edge Function's serve env (gitignored locally; generated here). The
      # STUBBED `/callback` needs only the signing secret + the E2E SSRF-allowlist
      # origin. The secret is generated per-run: a self-signing harness can never
      # validate the PROD secret anyway — that's the live smoke's job (lessons.md
      # "A self-signing local webhook harness can't catch a wrong provider secret").
      # SUPABASE_URL/SERVICE_ROLE_KEY are auto-injected by `functions serve` — do
      # NOT set them here.
      #
      # E2E_ALLOWED_OUTPUT_ORIGIN must equal the fixture server's advertised
      # origin. The spec advertises host.docker.internal:8787 (fixture-server.ts
      # default; the host is NOT spec-overridable, so the plan's 172.17.0.1
      # fallback is moot — CI matches the spec). The Supabase CLI maps
      # host.docker.internal → host-gateway on its managed containers, so the
      # edge-runtime container resolves it on a Linux runner too.
      # ⚠️ NEVER set E2E_ALLOWED_OUTPUT_ORIGIN in production — it widens the SSRF
      # output-fetch allowlist (default-off seam; see cloud-live-smoke.md).
      - name: Generate Edge Function serve env (stubbed pipeline)
        run: |
          mkdir -p supabase/functions
          {
            echo "REPLICATE_WEBHOOK_SIGNING_SECRET=whsec_$(openssl rand -base64 24)"
            echo "DB_WEBHOOK_SECRET=e2e-unused-on-callback"
            echo "CLOUD_PIPELINE_ENABLED=false"
            echo "E2E_ALLOWED_OUTPUT_ORIGIN=http://host.docker.internal:8787"
          } > supabase/functions/.env
      # Serve the function in the background (survives across steps — same
      # runner). The router's 404 on a bare GET IS the ready signal: any HTTP
      # response (code != 000) means the gateway is up. Env is read at serve
      # startup. Fail fast with the log if it never binds.
      - name: Serve the enhance Edge Function (background) + readiness probe
        run: |
          npx supabase functions serve enhance --env-file supabase/functions/.env \
            > "$RUNNER_TEMP/functions-serve.log" 2>&1 &
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$SUPABASE_URL/functions/v1/enhance" || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "enhance serve ready (HTTP $code)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::enhance Edge Function never became reachable at $SUPABASE_URL/functions/v1/enhance"
          cat "$RUNNER_TEMP/functions-serve.log" || true
          exit 1
      # Cache the chromium binary (keyed on the lockfile — pins @playwright/test →
      # browser build). `install --with-deps` pulls the apt system libs (not
      # cacheable) and downloads the binary only on a cache miss.
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install chromium --with-deps
      # Playwright starts its own dev server (webServer.reuseExistingServer is
      # false under CI) and runs setup → seed/anon → north-star → stall. CI=true
      # (GitHub default) ⇒ retries: 1. The fresh-stack Realtime cold-start flake
      # is absorbed by the north-star spec's own warmup precondition
      # (tests/e2e/helpers/realtime-ready.ts) — no extra CI step needed.
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [ci, integration, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      # Unit tests run in `ci`; the full suite runs in `integration`; `deno
      # check` runs in `ci`. All three gate this job via `needs:` above, so
      # none are repeated here.
      # App → Cloudflare Workers. Worker runtime secrets were set once via
      # `wrangler secret put` (Phase 2 #5) and persist across deploys, so
      # CLOUD_PIPELINE_ENABLED=false / CLOUD_DAILY_CAP=0 stay authoritative.
      # The build still needs SUPABASE_URL/SUPABASE_KEY as build-time env.
      # v4 runs on Node 24 (v3 was Node 20 — forced off by GitHub 2026-06-16) and
      # defaults to Wrangler v4, matching the project's wrangler 4.x devDependency.
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          preCommands: |
            npm run build
            # Pre-deploy privacy guard (follow-up 3.7): the token-bearing build uploads
            # source maps to Sentry and the SDK auto-deletes the emitted maps per-build.
            # If any client .map survives, that cleanup failed and we'd ship source maps
            # as public static assets — refuse to deploy rather than expose source.
            if find dist/client -name '*.map' -print -quit | grep -q .; then
              echo "::error::client source maps present in dist/client — refusing to deploy"
              exit 1
            fi
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Sentry build-time env. SENTRY_AUTH_TOKEN drives source-map upload (the
          # @sentry/astro integration uploads during `npm run build` then cleans the
          # emitted maps). PUBLIC_SENTRY_DSN + PUBLIC_SENTRY_ENVIRONMENT are baked
          # into the client bundle (public by design). The SERVER DSN + environment
          # are Worker RUNTIME values (wrangler secret/var), not build-time — see
          # change.md runtime prerequisites. All optional: absent token → upload is
          # skipped, absent DSN → SDK no-ops.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
          PUBLIC_SENTRY_ENVIRONMENT: production
      # Edge Function → Supabase. Use the version-pinned supabase CLI from
      # devDependencies via npx (deterministic — no unpinned global install).
      # --use-api forces API bundling (no Docker on the runner); the deploy
      # honors config.toml verify_jwt=false.
      - run: npx supabase functions deploy enhance --use-api --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
